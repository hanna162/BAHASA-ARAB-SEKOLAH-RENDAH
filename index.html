  function getCategoryForAnswer(answer) {
    for (const [catName, list] of Object.entries(categoryDistractors)) {
      if (list.includes(answer)) {
        return list;
      }
    }
    return generic;
  }

  function choicesFor(answer){
    const pool = getCategoryForAnswer(answer);
    const choices = [answer];
    // Filter distractors from the matching contextual category
    const filteredPool = pool.filter(x => x !== answer);
    
    // Sort and grab 2 distractors to form exactly 3 options (A, B, C)
    const distractors = filteredPool.sort(() => Math.random() - 0.5).slice(0, 2);
    distractors.forEach(d => choices.push(d));
    
    // Fallback if we couldn't get enough related category items
    if (choices.length < 3) {
      generic.forEach(x => {
        if (x !== answer && !choices.includes(x) && choices.length < 3) {
          choices.push(x);
        }
      });
    }
    
    return choices.sort(() => Math.random() - 0.5);
  }
  function createQuizCards(year){
    const list=document.getElementById('quiz'+year+'-list');
    quizData[year].forEach((item,index)=>{
      const [arabic,prompt,answer]=item,options=choicesFor(answer),el=document.createElement('article');
      el.className='quiz-card comic-border rounded-3xl bg-[#fff8e7] p-5 sm:p-6';

      el.querySelectorAll('.choice').forEach(button=>button.addEventListener('click',()=>selectAnswer(button)));
      list.appendChild(el);
    });
  }
  function selectAnswer(button){
    const card=button.closest('.quiz-card'),feedback=card.querySelector('.feedback'),correct=button.dataset.answer===button.dataset.correct;
    card.querySelectorAll('.choice').forEach(b=>b.classList.remove('correct','wrong'));
    button.classList.add(correct?'correct':'wrong');
    feedback.textContent=correct?'Betul! Tahniah. 🌟':'Cuba lagi! Lihat kunci jawapan di bawah.';
    feedback.className='feedback mt-5 rounded-2xl px-4 py-3 text-center font-extrabold '+(correct?'bg-[#d9f7dc] text-[#155b23]':'bg-[#ffe1dc] text-[#8b251c]');
    card.classList.add('revealed');
    const list=card.parentElement;
    if(list.querySelectorAll('.quiz-card.revealed').length===list.querySelectorAll('.quiz-card').length&&!list.querySelector('.finish-quiz-btn')){

    }
  }
